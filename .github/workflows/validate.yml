name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  repo-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate required surfaces and markdown links
        run: python scripts/validate_repo.py
